* { margin:0; padding:0; box-sizing:border-box; }

body {

}

/* ========== 顶部导航 ========== */
.header {
  position: fixed; top:0; left:0; right:0; z-index:100;

  background: linear-gradient(135deg, var(--primary) 0%, #2C3E50 100%);
  color: #fff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.header-title {
  font-size: 20px; font-weight: 700; letter-spacing: 1px;
}
.header-title span { color: var(--accent); }
.header-stats {
  display: flex; gap: 20px; font-size: 13px; opacity: 0.9;
}
.header-stats .stat { display: flex; align-items: center; gap: 4px; }
.header-stats .num { font-weight: 700; font-size: 16px; color: #F39C12; }

/* ========== 左侧边栏 ========== */
.sidebar {
  position: fixed; top: var(--header-height); left: 0;
  width: var(--sidebar-width);
  height: calc(100vh - var(--header-height));
  background: #fff;
  border-right: 1px solid #e8e8e8;
  overflow-y: auto;
  padding: 16px 0;
}
.sidebar-title {
  font-size: 13px; font-weight: 700; color: var(--meta);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 0 20px 10px; border-bottom: 1px solid #eee;
  margin-bottom: 8px;
}
.date-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px; cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid transparent;
  font-size: 14px;
}
.date-item:hover { background: var(--light-bg); }
.date-item.active {
  background: var(--summary-bg);
  border-left-color: var(--summary-border);
  font-weight: 600;
  color: var(--summary-border);
}
.date-item .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--divider);
  flex-shrink: 0;
}
.date-item.active .dot { background: var(--summary-border); }
.date-item .count {
  margin-left: auto;
  background: var(--light-bg);
  color: var(--meta);
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px;
}
.date-item.active .count {
  background: var(--summary-border);
  color: #fff;
}

/* ========== 主内容区 ========== */
.main {
  margin-left: var(--sidebar-width);
  margin-top: var(--header-height);
  padding: 24px 32px 40px;
  min-height: calc(100vh - var(--header-height));
}

/* 搜索栏 */
.search-bar {
  position: relative;
  margin-bottom: 24px;
}
.search-bar input {
  width: 100%; max-width: 480px;
  padding: 10px 16px 10px 40px;
  border: 1px solid #ddd;
  border-radius: 24px;
  font-size: 14px;
  background: #fff;
  transition: border-color 0.2s;
  outline: none;
}
.search-bar input:focus { border-color: var(--summary-border); }
.search-bar .icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--meta); font-size: 16px;
}

/* 日期标题 */
.date-header {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--primary);
}
.date-header h2 {
  font-size: 22px; color: var(--primary);
}
.date-header .scan-info {
  font-size: 13px; color: var(--meta);
}

/* ========== 研报卡片 ========== */
.report-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  margin-bottom: 24px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.report-card:hover {
  box-shadow: 0 4px 20px rgba(27,42,74,0.12);
}

.card-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid #f0f0f0;
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 16px;
}
.card-header h3 {
  font-size: 17px; font-weight: 700; color: var(--primary);
  line-height: 1.5;
  flex: 1;
}
.card-header .badge {

  padding: 3px 10px;
  border-radius: 12px;

.badge-en {
  background: var(--summary-bg); color: var(--summary-border);

.badge-other {
  background: #FFF3E0; color: #E65100;

  font-size: 12px; color: var(--meta);
  background: #fafafa;
  display: flex; gap: 16px; flex-wrap: wrap;
}
.card-meta span { display: flex; align-items: center; gap: 4px; }

.card-body {
  padding: 20px 24px;

  background: var(--summary-bg);
  border: 1px solid var(--summary-border);
  border-left: 4px solid var(--summary-border);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 16px 20px;

  color: var(--summary-border);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;

.summary-box .label::before {
  content: "";
  display: inline-block; width: 4px; height: 16px;
  background: var(--summary-border); border-radius: 2px;
}
.summary-box .text {
  font-size: 14px; line-height: 1.8; color: var(--body-text);

.points-box .label::before {

.point-item:last-child { margin-bottom: 0; }

  background: var(--accent);
  color: #fff; font-weight: 700;
  font-size: 11px;
  width: 22px; height: 22px;

  display: flex; align-items: center; justify-content: center;
  margin-top: 3px;

/* 英文原文框 */

.original-box .text {

/* ========== 响应式 ========== */
@media (max-width: 900px) {

  .main { margin-left: 0; padding: 16px; }

// 当前筛选状态
let currentFilter = 'all';
let searchQuery = '';

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  renderContent();
});

// 按日期筛选
function filterByDate(date) {
  currentFilter = date;
  // 更新侧边栏高亮
  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('active', el.dataset.date === date);
  });
  renderContent();
}

// 搜索
function handleSearch(query) {
  searchQuery = query.trim().toLowerCase();
  renderContent();
}

// 渲染内容
function renderContent() {
  const container = document.getElementById('contentArea');
  let scans = HISTORY.scans || [];
  
  // 按日期筛选
  if (currentFilter !== 'all') {
    scans = scans.filter(s => s.scan_time && s.scan_time.startsWith(currentFilter));
  }
  
  // 搜索过滤
  if (searchQuery) {
    scans = scans.map(s => {
      const filteredSummaries = (s.summaries || []).filter(r => {
        const searchText = [
          r.filename, r.summary, r.original_language,
          ...(r.key_points || []), r.original_summary
        ].join(' ').toLowerCase();
        return searchText.includes(searchQuery);
      });
      return {...s, summaries: filteredSummaries};
    }).filter(s => s.summaries && s.summaries.length > 0);
  }
  
  // 按时间倒序
  scans.sort((a, b) => b.scan_time.localeCompare(a.scan_time));
  
  if (scans.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <h3>${searchQuery ? '未找到匹配的研报' : '暂无扫描记录'}</h3>
        <p>${searchQuery ? '尝试使用其他关键词搜索' : '将研报文件放入监控文件夹后，系统会自动扫描总结'}</p>
      </div>
    `;
    return;
  }
  
  // 按日期分组渲染
  let html = '<div class="all-dates-view">';
  
  // 按日期分组
  const grouped = {};
  scans.forEach(s => {
    try {
      const dateKey = new Date(s.scan_time).toISOString().split('T')[0];
      if (!grouped[dateKey]) grouped[dateKey] = [];
      grouped[dateKey].push(s);
    } catch(e) {}
  });
  
  const sortedDates = Object.keys(grouped).sort().reverse();
  
  for (const date of sortedDates) {
    const dayScans = grouped[date];
    const totalReports = dayScans.reduce((acc, s) => acc + (s.summaries || []).length, 0);
    
    // 日期标题
    const dateDisplay = formatDate(date);
    html += `<div class="date-section">`;
    html += `<div class="date-section-title">${dateDisplay} <span class="date-count">${totalReports}份</span></div>`;
    
    for (const scan of dayScans) {
      const scanTime = formatTime(scan.scan_time);
      html += `<div class="date-header" style="margin-bottom:16px;">
        <h2 style="font-size:16px;">第${scan.scan_sequence}次扫描</h2>
        <span class="scan-info">${scanTime} | ${(scan.summaries||[]).length}份研报</span>
      </div>`;
      
      for (const report of (scan.summaries || [])) {
        html += renderReportCard(report);
      }
    }
    
    html += `</div>`;
  }
  
  html += '</div>';
  container.innerHTML = html;
}

// 渲染单个研报卡片
function renderReportCard(r) {
  const isEn = r.is_english;
  const lang = r.original_language || '未知';
  const badgeClass = isEn ? 'badge-en' : (lang === '中文' ? 'badge-cn' : 'badge-other');
  const badgeText = isEn ? '英文→中文翻译' : (lang === '中文' ? '中文' : lang);
  
  // 文件名去后缀
  let displayName = r.filename || '未知文档';
  const exts = ['.pdf','.txt','.md','.docx','.doc','.csv','.html','.htm','.json','.xml','.log'];
  for (const ext of exts) {
    if (displayName.toLowerCase().endsWith(ext)) {
      displayName = displayName.slice(0, -ext.length);
      break;
    }
  }
  
  let html = `
  <div class="report-card">
    <div class="card-header">
      <h3>${escapeHtml(displayName)}</h3>
      <span class="badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="card-meta">
      <span>📄 ${escapeHtml(r.size || '未知')}</span>
      <span>🌐 ${escapeHtml(lang)}</span>
      ${isEn ? '<span>✅ 已翻译为中文</span>' : ''}
    </div>
    <div class="card-body">`;
  
  // 核心内容
  if (r.summary) {
    html += `
    <div class="summary-box">
      <div class="label">核心内容</div>
      <div class="text">${escapeHtml(r.summary)}</div>
    </div>`;
  }
  
  // 核心要点
  if (r.key_points && r.key_points.length > 0) {
    html += `
    <div class="points-box">
      <div class="label">核心要点</div>`;
    r.key_points.forEach((p, i) => {
      html += `
      <div class="point-item">
        <span class="point-num">${i+1}</span>
        <span>${escapeHtml(p)}</span>
      </div>`;
    });
    html += `</div>`;
  }
  
  // 英文原文
  if (r.original_summary && isEn) {
    html += `
    <div class="original-box">
      <div class="label">English Summary (Original)</div>
      <div class="text">${escapeHtml(r.original_summary)}</div>
    </div>`;
  }
  
  html += `
    </div>
  </div>`;
  
  return html;
}

// 工具函数
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatDate(dateStr) {
  try {
    const d = new Date(dateStr);
    const year = d.getFullYear();
    const month = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const weekdays = ['日','一','二','三','四','五','六'];
    return `${year}年${month}月${day}日 星期${weekdays[d.getDay()]}`;
  } catch(e) {
    return dateStr;
  }
}

function formatTime(isoStr) {
  try {
    const d = new Date(isoStr);
    return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    return isoStr;
  }
}
